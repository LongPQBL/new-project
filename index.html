<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tin Nóng 24h</title>

<style>
:root{
    --bg:#f4f4f4;
    --card:#fff;
    --text:#111;
    --primary:#007bff;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#eee;
    --primary:#4da3ff;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:20px;
    flex-wrap:wrap;
}

input, button, select{
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.loader{
    text-align:center;
    font-size:18px;
    padding:30px;
}
</style>
</head>

<body>

<header>
<h1>TIN NÓNG 24H</h1>
<p>Tổng hợp các bài báo đáng chú ý</p>
</header>

<div class="controls">
<input type="text" id="searchInput" placeholder="Tìm kiếm (ví dụ: Trung Đông)">
<button onclick="searchNews()">Tìm</button>

<select id="categorySelect" onchange="getNews()">
<option value="general">Chung</option>
<option value="world">Thế giới</option>
<option value="business">Kinh tế</option>
<option value="technology">Công nghệ</option>
</select>

<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="loader" id="loader"></div>
<div class="container" id="news-container"></div>

<script>

const news = [
    {
        title: "Cập nhật chiến sự Trung Đông mới nhất",
        description: "Diễn biến mới liên quan đến căng thẳng khu vực Trung Đông.",
        image: "https://source.unsplash.com/600x400/?middle-east",
        link: "https://vnexpress.net/chien-su-trung-dong-4750000.html"
    },
    {
        title: "Phân tích xung đột Israel - Hamas",
        description: "Các chuyên gia nhận định về tình hình hiện tại.",
        image: "https://source.unsplash.com/600x400/?war",
        link: "https://www.bbc.com/news/world-middle-east"
    },
    {
        title: "Giá dầu thế giới biến động do bất ổn địa chính trị",
        description: "Thị trường năng lượng chịu tác động từ chiến sự.",
        image: "https://source.unsplash.com/600x400/?oil",
        link: "https://www.reuters.com/markets/commodities/"
    },
    {
        title: "Kinh tế toàn cầu trước nguy cơ suy thoái",
        description: "Các nền kinh tế lớn đối mặt thách thức tăng trưởng.",
        image: "https://source.unsplash.com/600x400/?economy",
        link: "https://www.cnn.com/business"
    },
    {
        title: "Công nghệ AI tiếp tục phát triển mạnh",
        description: "Nhiều công ty đầu tư mạnh vào trí tuệ nhân tạo.",
        image: "https://source.unsplash.com/600x400/?technology",
        link: "https://techcrunch.com/"
    },
    {
        title: "Tình hình Biển Đông được quan tâm",
        description: "Các diễn biến mới về an ninh khu vực.",
        image: "https://source.unsplash.com/600x400/?sea",
        link: "https://tuoitre.vn/"
    }
];

const container = document.getElementById("news-container");

news.forEach((item, index) => {

    const articleId = item.link;

    if(!localStorage.getItem(articleId)){
        localStorage.setItem(articleId, 0);
    }

    container.innerHTML += `
        <div class="card">
            <img src="${item.image}">
            <div class="card-content">
                <h3>${item.title}</h3>
                <p>${item.description}</p>
                <p>👁️ Lượt xem:
                    <span id="view-${index}">
                        ${localStorage.getItem(articleId)}
                    </span>
                </p>
                <button onclick="increaseView('${articleId}', ${index}, '${item.link}')">
                    Đọc nguồn
                </button>
            </div>
        </div>
    `;
});

function increaseView(articleId, index, url){
    let views = parseInt(localStorage.getItem(articleId));
    views++;
    localStorage.setItem(articleId, views);

    let total = parseInt(localStorage.getItem("totalViews") || 0);
    total++;
    localStorage.setItem("totalViews", total);

    document.getElementById("view-" + index).innerText = views;
    window.open(url, "_blank");
}

</script>

</body>
</html>
