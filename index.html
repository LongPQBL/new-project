<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tổng Hợp Tin Nổi Bật</title>

<style>
:root{
    --bg:#f5f5f5;
    --card:#ffffff;
    --text:#111;
    --primary:#c62828;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#eee;
    --primary:#ff5252;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
}

.total-views{
    margin-top:8px;
    font-size:14px;
    opacity:0.9;
}

.controls{
    text-align:center;
    padding:15px;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:var(--primary);
    color:white;
}

button:hover{
    opacity:0.85;
}

/* BÀI NỔI BẬT */
.featured{
    width:90%;
    max-width:1100px;
    margin:20px auto;
    background:var(--card);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.featured img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.featured-content{
    padding:20px;
}

/* DANH SÁCH BÀI */
.container{
    width:90%;
    max-width:1100px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

footer{
    margin-top:40px;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <h1>TỔNG HỢP TIN NỔI BẬT</h1>
    <div class="total-views" id="totalViews"></div>
</header>

<div class="controls">
    <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div id="featured-container"></div>
<div class="container" id="news-container"></div>

<footer>
    © 2026 Tổng Hợp Tin | Chỉ tổng hợp & dẫn nguồn báo chí
</footer>

<script>

const news = [
{
    title:"Chiến sự Trung Đông tiếp tục leo thang",
    description:"Căng thẳng khu vực Trung Đông gia tăng với nhiều diễn biến mới.",
    image:"https://images.unsplash.com/photo-1504711434969-e33886168f5c",
    link:"https://www.bbc.com/news"
},
{
    title:"Giá dầu thế giới tăng mạnh do bất ổn",
    description:"Thị trường năng lượng phản ứng trước tình hình địa chính trị.",
    image:"https://images.unsplash.com/photo-1581092334651-ddf26d9a09d0",
    link:"https://www.reuters.com/"
},
{
    title:"Kinh tế toàn cầu trước nguy cơ suy thoái",
    description:"Các chuyên gia cảnh báo về tăng trưởng chậm lại.",
    image:"https://images.unsplash.com/photo-1454165804606-c3d57bc86b40",
    link:"https://edition.cnn.com/business"
},
{
    title:"AI bùng nổ trong năm 2026",
    description:"Doanh nghiệp công nghệ đầu tư mạnh vào trí tuệ nhân tạo.",
    image:"https://images.unsplash.com/photo-1518770660439-4636190af475",
    link:"https://techcrunch.com/"
},
{
    title:"Biển Đông thu hút sự quan tâm quốc tế",
    description:"Diễn biến an ninh khu vực được theo dõi sát sao.",
    image:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
    link:"https://tuoitre.vn/"
}
];

if(!localStorage.getItem("totalViews")){
    localStorage.setItem("totalViews",0);
}

function updateTotal(){
    document.getElementById("totalViews").innerText=
        "👁️ Tổng lượt xem toàn website: "+localStorage.getItem("totalViews");
}
updateTotal();

const featuredContainer=document.getElementById("featured-container");
const container=document.getElementById("news-container");

/* BÀI ĐẦU LÀ BÀI NỔI BẬT */
const featured=news[0];

if(!localStorage.getItem(featured.link)){
    localStorage.setItem(featured.link,0);
}

featuredContainer.innerHTML=`
<div class="featured">
    <img src="${featured.image}">
    <div class="featured-content">
        <h2>${featured.title}</h2>
        <p>${featured.description}</p>
        <p>👁️ Lượt xem: 
            <span id="view-featured">
            ${localStorage.getItem(featured.link)}
            </span>
        </p>
        <button onclick="increaseView('${featured.link}','featured')">
            Đọc nguồn
        </button>
    </div>
</div>
`;

/* CÁC BÀI CÒN LẠI */
news.slice(1).forEach((item,index)=>{

    if(!localStorage.getItem(item.link)){
        localStorage.setItem(item.link,0);
    }

    container.innerHTML+=`
    <div class="card">
        <img src="${item.image}">
        <div class="card-content">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
            <p>👁️ Lượt xem: 
                <span id="view-${index}">
                ${localStorage.getItem(item.link)}
                </span>
            </p>
            <button onclick="increaseView('${item.link}',${index})">
                Đọc nguồn
            </button>
        </div>
    </div>
    `;
});

function increaseView(link,id){
    let views=parseInt(localStorage.getItem(link));
    views++;
    localStorage.setItem(link,views);

    let total=parseInt(localStorage.getItem("totalViews"));
    total++;
    localStorage.setItem("totalViews",total);

    if(id==="featured"){
        document.getElementById("view-featured").innerText=views;
    }else{
        document.getElementById("view-"+id).innerText=views;
    }

    updateTotal();
    window.open(link,"_blank");
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
